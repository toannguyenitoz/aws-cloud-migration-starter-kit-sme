<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#f8fafc"/>
  <text x="40" y="60" font-family="Arial" font-size="30" font-weight="700" fill="#0f172a">AWS Console Manual Setup - Security and Core Services</text>
  <text x="40" y="95" font-family="Arial" font-size="18" fill="#334155">Create Security Groups, IAM role, S3 bucket, and RDS private database.</text>
  <rect x="55" y="130" width="250" height="230" rx="18" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="88" y="175" font-family="Arial" font-size="24" font-weight="700" fill="#1d4ed8">ALB SG</text>
  <text x="88" y="210" font-family="Arial" font-size="18" fill="#0f172a">Allow 80 / 443</text>
  <text x="88" y="238" font-family="Arial" font-size="18" fill="#0f172a">from the internet</text>
  <rect x="330" y="130" width="250" height="230" rx="18" fill="#dcfce7" stroke="#22c55e"/>
  <text x="365" y="175" font-family="Arial" font-size="24" font-weight="700" fill="#166534">App SG</text>
  <text x="365" y="210" font-family="Arial" font-size="18" fill="#0f172a">Allow HTTP from</text>
  <text x="365" y="238" font-family="Arial" font-size="18" fill="#0f172a">ALB Security Group</text>
  <rect x="605" y="130" width="250" height="230" rx="18" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="640" y="175" font-family="Arial" font-size="24" font-weight="700" fill="#6b21a8">RDS SG</text>
  <text x="640" y="210" font-family="Arial" font-size="18" fill="#0f172a">Allow 3306 only</text>
  <text x="640" y="238" font-family="Arial" font-size="18" fill="#0f172a">from App SG</text>
  <rect x="880" y="130" width="250" height="230" rx="18" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="910" y="175" font-family="Arial" font-size="24" font-weight="700" fill="#92400e">IAM + S3 + RDS</text>
  <text x="910" y="210" font-family="Arial" font-size="18" fill="#0f172a">EC2 role with SSM</text>
  <text x="910" y="238" font-family="Arial" font-size="18" fill="#0f172a">Private bucket + DB</text>
  <path d="M305 245 L330 245" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M580 245 L605 245" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M855 245 L880 245" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
</svg>
