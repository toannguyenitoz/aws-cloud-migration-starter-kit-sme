<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AWS cloud migration architecture overview">
  <defs>
    <style>
      .title{font-family:Arial, sans-serif;font-size:34px;font-weight:700;fill:#18324a}
      .subtitle{font-family:Arial, sans-serif;font-size:18px;fill:#31516d}
      .label{font-family:Arial, sans-serif;font-size:16px;fill:#102a43}
      .small{font-family:Arial, sans-serif;font-size:13px;fill:#334e68}
      .box{fill:#f8fbff;stroke:#2f80ed;stroke-width:2;rx:14}
      .public{fill:#fff8e6;stroke:#f2a900;stroke-width:2;rx:12}
      .private{fill:#ecfff4;stroke:#27ae60;stroke-width:2;rx:12}
      .data{fill:#f5ecff;stroke:#8e44ad;stroke-width:2;rx:12}
      .sec{fill:#fff1f1;stroke:#c0392b;stroke-width:2;rx:12}
      .arrow{stroke:#1f2937;stroke-width:2;marker-end:url(#arrow)}
      .dashed{stroke:#1f2937;stroke-width:2;stroke-dasharray:8 6;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="40" y="55" class="title">AWS Cloud Migration Starter Kit</text>
  <text x="40" y="84" class="subtitle">Fictional SME: Southern Cross Office Supplies Pty Ltd - Adelaide</text>

  <rect x="40" y="125" width="180" height="90" class="box"/>
  <text x="70" y="160" class="label">Users</text>
  <text x="70" y="185" class="small">Customers / Staff</text>

  <rect x="280" y="110" width="840" height="560" class="box"/>
  <text x="310" y="145" class="label">AWS Production Account - VPC 10.20.0.0/16</text>

  <rect x="320" y="185" width="750" height="120" class="public"/>
  <text x="345" y="215" class="label">Public Subnets across 2 Availability Zones</text>
  <rect x="360" y="240" width="180" height="42" class="box"/><text x="392" y="267" class="small">Application Load Balancer</text>
  <rect x="620" y="240" width="150" height="42" class="box"/><text x="652" y="267" class="small">NAT Gateway</text>
  <rect x="830" y="240" width="170" height="42" class="box"/><text x="862" y="267" class="small">Internet Gateway</text>

  <rect x="320" y="335" width="750" height="120" class="private"/>
  <text x="345" y="365" class="label">Private Application Subnets</text>
  <rect x="410" y="390" width="250" height="42" class="box"/><text x="452" y="417" class="small">EC2 Auto Scaling Group</text>
  <rect x="750" y="390" width="190" height="42" class="box"/><text x="790" y="417" class="small">Systems Manager</text>

  <rect x="320" y="485" width="750" height="120" class="data"/>
  <text x="345" y="515" class="label">Private Data Subnets</text>
  <rect x="400" y="540" width="180" height="42" class="box"/><text x="450" y="567" class="small">RDS Multi-AZ</text>
  <rect x="650" y="540" width="180" height="42" class="box"/><text x="704" y="567" class="small">S3 Backup</text>

  <rect x="40" y="455" width="180" height="90" class="sec"/>
  <text x="67" y="490" class="label">On-Premises</text>
  <text x="65" y="515" class="small">HQ / Branch Network</text>

  <rect x="40" y="585" width="180" height="70" class="sec"/>
  <text x="60" y="620" class="label">Security Baseline</text>
  <text x="60" y="642" class="small">IAM, CloudTrail, Config</text>

  <line x1="220" y1="170" x2="360" y2="260" class="arrow"/>
  <line x1="540" y1="260" x2="410" y2="410" class="arrow"/>
  <line x1="660" y1="410" x2="400" y2="560" class="arrow"/>
  <line x1="660" y1="410" x2="650" y2="560" class="arrow"/>
  <line x1="220" y1="500" x2="320" y2="395" class="dashed"/>
  <line x1="220" y1="620" x2="320" y2="620" class="dashed"/>

  <text x="40" y="720" class="small">Secure Everything. Connect Anywhere. Build Cloud Networks with Confidence. #ToanNguyenITOz</text>
</svg>
