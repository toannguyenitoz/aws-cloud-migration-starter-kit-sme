<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440">
  <rect width="1200" height="440" fill="#f8fafc"/>
  <text x="40" y="60" font-family="Arial" font-size="30" font-weight="700" fill="#0f172a">AWS Console Manual Setup - Validation, Monitoring, Backup, and Cleanup</text>
  <text x="40" y="95" font-family="Arial" font-size="18" fill="#334155">Validate target health, test scaling safely, configure alarms and backups, and delete resources when finished.</text>
  <rect x="70" y="145" width="220" height="190" rx="18" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="105" y="190" font-family="Arial" font-size="24" font-weight="700" fill="#1d4ed8">Validate ALB</text>
  <text x="105" y="225" font-family="Arial" font-size="18" fill="#0f172a">Healthy targets</text>
  <text x="105" y="253" font-family="Arial" font-size="18" fill="#0f172a">Open ALB DNS</text>
  <rect x="335" y="145" width="220" height="190" rx="18" fill="#dcfce7" stroke="#22c55e"/>
  <text x="355" y="190" font-family="Arial" font-size="24" font-weight="700" fill="#166534">Test Scaling</text>
  <text x="355" y="225" font-family="Arial" font-size="18" fill="#0f172a">Change desired capacity</text>
  <text x="355" y="253" font-family="Arial" font-size="18" fill="#0f172a">or safe CPU test</text>
  <rect x="600" y="145" width="220" height="190" rx="18" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="632" y="190" font-family="Arial" font-size="24" font-weight="700" fill="#92400e">CloudWatch</text>
  <text x="632" y="225" font-family="Arial" font-size="18" fill="#0f172a">Create alarms + SNS</text>
  <text x="632" y="253" font-family="Arial" font-size="18" fill="#0f172a">Estimated charges</text>
  <rect x="865" y="145" width="220" height="190" rx="18" fill="#fee2e2" stroke="#ef4444"/>
  <text x="897" y="190" font-family="Arial" font-size="24" font-weight="700" fill="#991b1b">Backup & Cleanup</text>
  <text x="897" y="225" font-family="Arial" font-size="18" fill="#0f172a">RDS snapshots</text>
  <text x="897" y="253" font-family="Arial" font-size="18" fill="#0f172a">Delete costly resources</text>
  <path d="M290 240 L335 240" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M555 240 L600 240" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M820 240 L865 240" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
