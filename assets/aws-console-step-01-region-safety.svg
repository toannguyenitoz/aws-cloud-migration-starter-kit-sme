<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#f8fafc"/>
  <rect x="30" y="30" width="1140" height="360" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="60" y="80" font-family="Arial" font-size="30" font-weight="700" fill="#0f172a">AWS Console Manual Setup - Step Group 1</text>
  <text x="60" y="120" font-family="Arial" font-size="20" fill="#334155">Choose Region and secure the AWS account before building anything.</text>
  <rect x="70" y="160" width="220" height="150" rx="14" fill="#e0f2fe" stroke="#38bdf8"/>
  <text x="95" y="205" font-family="Arial" font-size="24" font-weight="700" fill="#0c4a6e">1. Select Region</text>
  <text x="95" y="240" font-family="Arial" font-size="18" fill="#0f172a">ap-southeast-2</text>
  <text x="95" y="268" font-family="Arial" font-size="18" fill="#0f172a">Asia Pacific (Sydney)</text>
  <rect x="345" y="160" width="220" height="150" rx="14" fill="#ecfccb" stroke="#84cc16"/>
  <text x="370" y="205" font-family="Arial" font-size="24" font-weight="700" fill="#365314">2. Enable MFA</text>
  <text x="370" y="240" font-family="Arial" font-size="18" fill="#0f172a">Protect root and admin</text>
  <text x="370" y="268" font-family="Arial" font-size="18" fill="#0f172a">accounts with MFA</text>
  <rect x="620" y="160" width="220" height="150" rx="14" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="645" y="205" font-family="Arial" font-size="24" font-weight="700" fill="#92400e">3. Create Budget</text>
  <text x="645" y="240" font-family="Arial" font-size="18" fill="#0f172a">Set monthly spend</text>
  <text x="645" y="268" font-family="Arial" font-size="18" fill="#0f172a">alerts at 50/80/100%</text>
  <rect x="895" y="160" width="220" height="150" rx="14" fill="#fee2e2" stroke="#ef4444"/>
  <text x="920" y="205" font-family="Arial" font-size="24" font-weight="700" fill="#991b1b">4. Apply Tags</text>
  <text x="920" y="240" font-family="Arial" font-size="18" fill="#0f172a">Project / Owner / Env</text>
  <text x="920" y="268" font-family="Arial" font-size="18" fill="#0f172a">for easy governance</text>
  <path d="M290 235 L345 235" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M565 235 L620 235" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M840 235 L895 235" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
</svg>
